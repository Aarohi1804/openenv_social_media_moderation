observation_space:
  misinfo_probability: "float [0.0, 1.0] - Estimated probability of misinformation"
  virality_score: "float [0.0, 1.0] - Current spread level"
  spread_velocity: "float [0.0, 1.0] - Rate of virality growth"
  report_count: "int [0, 200] - Total user reports"
  trusted_report_count: "int [0, 50] - Reports from credible users only"
  reporter_trust: "float [0.0, 1.0] - Trust of highest credibility reporter"
  user_credibility: "float [0.0, 1.0] - Trustworthiness of poster"
  is_repeat_offender: "bool - Whether user has been actioned before"
  factcheck_confidence: "float [0.0, 1.0] - Fact-checker review progress"
  content_category: "str - health | politics | entertainment | finance"
action_space:
  - ALLOW
  - LABEL_WARNING
  - REDUCE_REACH
  - DELETE
  - ESCALATE


