spec_version: 1
name: social_media_moderation_env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  A social media content moderation environment where an AI agent learns
  to make strategic decisions about incoming posts that may contain
  misinformation. The agent never sees ground truth — it must reason
  under uncertainty using noisy signals including misinfo probability,
  virality, spread velocity, reporting patterns, and fact-check confidence.
tags:
  - moderation
  - misinformation
  - content-safety
  - reinforcement-learning
  - social-media
tasks:
  - id: task_easy
    grader: server.social_media_moderation_env_environment:EasyGrader
  - id: task_medium
    grader: server.social_media_moderation_env_environment:MediumGrader
  - id: task_hard
    grader: server.social_media_moderation_env_environment:HardGrader
observation_space:
  misinfo_probability: "float [0.0, 1.0]"
  virality_score: "float [0.0, 1.0]"
  spread_velocity: "float [0.0, 1.0]"
  report_count: "int [0, 1000]"
  trusted_report_count: "int [0, 200]"
  reporter_trust: "float [0.0, 1.0]"
  user_credibility: "float [0.0, 1.0]"
  is_repeat_offender: "bool"
  factcheck_confidence: "float [0.0, 1.0]"
  content_category: "str"
  step_number: "int"
  posts_remaining: "int"
  environmental_warning: "str"
  user_id: "str"
  dynamic_reputation: "float [0.0, 1.0]"
action_space:
  - ALLOW
  - LABEL_WARNING
  - REDUCE_REACH
  - DELETE
  - ESCALATE
