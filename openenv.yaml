spec_version: 1
name: social_media_moderation_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  A social media content moderation environment where an AI agent learns
  to make strategic decisions about incoming posts that may contain
  misinformation. The agent never sees ground truth — it must reason
  under uncertainty using noisy signals including misinfo probability,
  virality, spread velocity, reporting patterns, and fact-check confidence.
tags:
  - moderation
  - misinformation
  - content-safety
  - reinforcement-learning
  - social-media
tasks:
  - id: task_easy
    name: Basic Moderation
    difficulty: easy
    grader: server.social_media_moderation_env_environment:EasyGrader
  - id: task_medium
    name: Balancing Act
    difficulty: medium
    grader: server.social_media_moderation_env_environment:MediumGrader
  - id: task_hard
    name: Campaign Detection
    difficulty: hard
    grader: server.social_media_moderation_env_environment:HardGrader
  # - id: task1
  #   name: Basic Moderation
  #   difficulty: easy
  #   description: >
  #     Moderate 10 posts with clear signals. Agent must correctly identify
  #     and act on obviously fake posts while leaving real posts alone.
  # - id: task2
  #   name: Balancing Act
  #   difficulty: medium
  #   description: >
  #     Moderate 15 posts with overlapping signals and adversarial reporting.
  #     Agent must balance containing fake posts while avoiding over-moderation
  #     of real posts that look suspicious.
  # - id: task3
  #   name: Campaign Detection
  #   difficulty: hard
  #   description: >
  #     Moderate 20 posts including a coordinated misinformation campaign of
  #     5 secretly linked posts. Agent must detect the campaign pattern while
  #     handling noisy signals and frequent adversarial reporting.
observation_space:
  misinfo_probability: "float [0.0, 1.0]"
  virality_score: "float [0.0, 1.0]"
  spread_velocity: "float [0.0, 1.0]"
  report_count: "int [0, 200]"
  trusted_report_count: "int [0, 50]"
  reporter_trust: "float [0.0, 1.0]"
  user_credibility: "float [0.0, 1.0]"
  is_repeat_offender: "bool"
  factcheck_confidence: "float [0.0, 1.0]"
  content_category: "str"
  step_number: "int"
  posts_remaining: "int"
action_space:
  - ALLOW
  - LABEL_WARNING
  - REDUCE_REACH
  - DELETE
  - ESCALATE
